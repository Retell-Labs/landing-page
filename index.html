<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retell — Learn Languages From Videos You Love</title>
    <meta
      name="description"
      content="Turn TikToks, YouTube Shorts, and your own photos into personalized language lessons. AI-powered vocabulary, pronunciation practice, and spaced repetition for 12+ languages."
    />
    <meta name="author" content="Retell" />
    <meta
      name="keywords"
      content="language learning app, learn from videos, TikTok language learning, vocabulary builder, pronunciation practice, spaced repetition, AI language tutor, learn languages from TikTok, language learning with AI, video-based language learning, mobile language app, learn Spanish from videos, learn Japanese from TikTok"
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Open Graph -->
    <meta property="og:title" content="Retell — Learn Languages From Videos You Love" />
    <meta
      property="og:description"
      content="Import any short video. Our AI creates a personalized lesson with vocabulary, pronunciation practice, and spaced repetition. Free for iOS and Android."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://retell.app" />
    <meta property="og:site_name" content="Retell" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@retell_app" />
    <meta name="twitter:creator" content="@retell_app" />
    <meta name="twitter:title" content="Retell — Learn Languages From Videos You Love" />
    <meta
      name="twitter:description"
      content="Import any short video. Our AI creates a personalized lesson with vocabulary, pronunciation practice, and spaced repetition."
    />

    <!-- Geo targeting -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="canonical" href="https://retell.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Young+Serif:wght@400&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data: MobileApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MobileApplication",
        "name": "Retell",
        "operatingSystem": "iOS, Android",
        "applicationCategory": "EducationalApplication",
        "description": "Learn languages from the videos you already love. AI-powered vocabulary, pronunciation, and spaced repetition for 12+ languages.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "500"
        }
      }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Retell",
        "url": "https://retell.app",
        "sameAs": [
          "https://instagram.com/retell_app",
          "https://tiktok.com/@retell_app",
          "https://youtube.com/@retell_app",
          "https://twitter.com/retell_app",
          "https://linkedin.com/company/retell-app"
        ]
      }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How does Retell turn videos into language lessons?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Share any TikTok, YouTube Short, or video from your camera roll to Retell. Our AI transcribes the audio, identifies key vocabulary with definitions, generates pronunciation exercises, and creates spaced repetition flashcards — all in seconds."
            }
          },
          {
            "@type": "Question",
            "name": "What languages does Retell support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Retell supports 12+ languages including Spanish, French, Japanese, Korean, Mandarin Chinese, German, Italian, Portuguese, and more. New languages are added regularly."
            }
          },
          {
            "@type": "Question",
            "name": "Is Retell free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, Retell is free to download and use on both iOS and Android. Start learning from videos immediately with no subscription required."
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
